# Speculative Decoding Benchmark Configuration
# Run: claude /workflows spec-decode-benchmark

cluster:
  kubeconfig: /Users/memehta/kubeconfigs/kubeconfig_rhaiis_ibm_dc
  namespace: kserve-e2e-perf
  accelerator: H200
  storage_class: nfs-provisioner
  user: mehulm

model:
  hf_id: openai/gpt-oss-120b
  image: quay.io/aipcc/rhaiis/cuda-ubi9:3.5.0-ea.2-1782155603
  version: RHAIIS-3.5.EA2
  tp: 1
  gpu_count: 1
  storage_pvc: model-pvc-2
  node_selector: psap-llmd-h200-gpu-qdndv
  service_account: sa
  image_pull_secret: npalaska-image-pull
  hf_token_secret: storage-config
  shared_memory_size: 8Gi
  model_loading_timeout: 300000
  vllm_args:
    gpu-memory-utilization: "0.85"
    trust-remote-code: "true"
    disable-log-requests: "true"
    uvicorn-log-level: debug
    no-enable-prefix-caching: "true"
    enable-expert-parallel: "true"

spec_decoding:
  enabled: false
  label: baseline

benchmark:
  dataset: speedbench
  splits:
    - throughput_1k
    - throughput_8k
  concurrency:
    - 1
    - 5
    - 25
    - 50
    - 100
  mode: per-concurrency
  max_requests_multiplier: 3
  max_requests_minimum: 100
  backend_timeout: 100000
  guidellm_version: v0.6.0
  prefix_caching: "yes"

output:
  results_dir: ./results
