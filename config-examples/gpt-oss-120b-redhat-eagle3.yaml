# gpt-oss-120b with RedHat Eagle3 draft model on RHAIIS
cluster:
  kubeconfig: /Users/memehta/kubeconfigs/kubeconfig-rhaiis-h200
  namespace: kserve-e2e-perf
  accelerator: H200
  storage_class: lvms-vg1
  user: mehulm

model:
  hf_id: openai/gpt-oss-120b
  image: quay.io/aipcc/rhaiis/cuda-ubi9:3.5.0-ea.1-1779124632
  version: RHAIIS-3.5.EA1
  tp: 1
  gpu_count: 1
  storage_pvc: model-pvc
  node_selector: ""
  service_account: sa
  image_pull_secret: npalaska-image-pull
  hf_token_secret: storage-config
  shared_memory_size: 8Gi
  model_loading_timeout: 300000
  vllm_args:
    gpu-memory-utilization: "0.85"
    trust-remote-code: "true"
    disable-log-requests: "true"
    uvicorn-log-level: debug
    no-enable-prefix-caching: "true"
    enable-expert-parallel: "true"
    max-cudagraph-capture-size: "2048"

spec_decoding:
  enabled: true
  draft_model: RedHatAI/gpt-oss-120b-speculator.eagle3
  num_speculative_tokens: 3
  method: eagle3
  draft_tensor_parallel_size: 1
  label: eagle3-redhat

benchmark:
  dataset: speedbench
  splits:
    - throughput_1k
    - throughput_8k
  concurrency: [1, 5, 25, 50, 100]
  mode: per-concurrency
  max_requests_multiplier: 3
  max_requests_minimum: 100
  backend_timeout: 100000
  guidellm_version: v0.6.0
  prefix_caching: "yes"

output:
  results_dir: ./results
