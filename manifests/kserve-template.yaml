# KServe deployment template for vLLM speculative decoding benchmarks
# Placeholders: __NAME__, __NAMESPACE__, __MODEL_ID__, __IMAGE__, __VLLM_ARGS__,
#   __GPU_COUNT__, __NODE_SELECTOR__, __STORAGE_PVC__, __SERVICE_ACCOUNT__,
#   __IMAGE_PULL_SECRET__, __HF_TOKEN_SECRET__, __SHARED_MEMORY_SIZE__,
#   __MODEL_LOADING_TIMEOUT__, __DEPLOYMENT_UUID__
#
# The workflow reads this template, replaces placeholders, and applies via oc apply -f
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/template-display-name: ServingRuntime for vLLM | Benchmark
  labels:
    opendatahub.io/dashboard: "true"
  name: __NAME__
  namespace: __NAMESPACE__
spec:
  builtInAdapter:
    modelLoadingTimeoutMillis: __MODEL_LOADING_TIMEOUT__
  imagePullSecrets:
  - name: __IMAGE_PULL_SECRET__
  containers:
  - command:
    - python3
    - -m
    - vllm.entrypoints.openai.api_server
    args:
    - --model=__MODEL_ID__
    - --port=8080
__VLLM_ARGS__
    env:
    - name: HF_HUB_OFFLINE
      value: "0"
    - name: HOME
      value: /mnt/models
    - name: HF_HOME
      value: /mnt/models
    - name: VLLM_CACHE_DIR
      value: /mnt/models/.cache/vllm
    - name: HF_DATASETS_CACHE
      value: /mnt/models/.cache/huggingface/datasets
    - name: HF_TOKEN
      valueFrom:
        secretKeyRef:
          name: __HF_TOKEN_SECRET__
          key: HF_TOKEN
    image: "__IMAGE__"
    name: kserve-container
    securityContext:
      runAsUser: 0
    ports:
    - containerPort: 8080
      protocol: TCP
    volumeMounts:
    - name: shared-memory
      mountPath: /dev/shm
  multiModel: false
  supportedModelFormats:
  - autoSelect: true
    name: pytorch
  volumes:
  - name: shared-memory
    emptyDir:
      medium: Memory
      sizeLimit: __SHARED_MEMORY_SIZE__
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8000"
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/enable-prometheus-scraping: "true"
    storage.kserve.io/readonly: "false"
  labels:
    opendatahub.io/dashboard: "true"
    deployment_uuid: __DEPLOYMENT_UUID__
  name: __NAME__
  namespace: __NAMESPACE__
spec:
  predictor:
    minReplicas: 1
    nodeSelector:
      kubernetes.io/hostname: __NODE_SELECTOR__
    model:
      resources:
        limits:
          nvidia.com/gpu: "__GPU_COUNT__"
        requests:
          nvidia.com/gpu: "__GPU_COUNT__"
          cpu: "4"
          memory: "16Gi"
      runtime: __NAME__
      modelFormat:
        name: pytorch
      storageUri: pvc://__STORAGE_PVC__
    serviceAccountName: __SERVICE_ACCOUNT__
